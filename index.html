<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>WEBGL DIAGNOSE</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }
#info{ padding:10px; }
</style>
</head>
<body>

<div id="info">CHECKING...</div>

<script>

// =====================
// STEP 1
// =====================
document.getElementById("info").innerText = "STEP 1: JS OK";

// =====================
// STEP 2: WEBGL CHECK
// =====================
const canvas = document.createElement("canvas");

let gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

if(!gl){
  document.getElementById("info").innerText =
    "❌ WEBGL BLOCKED - YOUR DEVICE CANNOT RUN 3D";
  throw new Error("WebGL not supported");
}

document.getElementById("info").innerText = "✅ WEBGL OK";

// =====================
// STEP 3: TRY THREE
// =====================
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
if(!window.THREE){
  document.getElementById("info").innerText = "❌ THREE FAILED";
  throw new Error("Three failed");
}

document.getElementById("info").innerText = "✅ THREE LOADED";

// =====================
// STEP 4: REAL RENDER TEST
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();

try {
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
} catch(e){
  document.getElementById("info").innerText = "❌ RENDERER FAILED";
  throw e;
}

// CUBE TEST
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(cube);

function animate(){
  requestAnimationFrame(animate);
  cube.rotation.y += 0.02;
  renderer.render(scene,camera);
}
animate();

document.getElementById("info").innerText = "🎮 3D WORKING";

</script>

</body>
</html>
