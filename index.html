<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS DEBUG MODE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
  z-index:10;
}
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:20px;
  z-index:10;
}
</style>
</head>
<body>

<div id="info">HTML OK</div>
<div id="crosshair">+</div>

<script>
console.log("STEP 1: JS STARTED");
document.getElementById("info").innerText = "JS OK";
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
console.log("STEP 2: THREE LOADED");

// ===== CHECK THREE =====
if(!window.THREE){
  document.getElementById("info").innerText = "THREE FAILED";
  throw new Error("Three.js not loaded");
}

document.getElementById("info").innerText = "THREE OK";

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

document.getElementById("info").innerText = "SCENE CREATED";

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth/innerHeight,
  0.1,
  1000
);
camera.position.set(0,2,5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

console.log("STEP 3: RENDERER CREATED");
document.getElementById("info").innerText = "RENDERER OK";

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DEBUG CUBE (MUSS SICHER SEIN!)
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
cube.position.y = 1;
scene.add(cube);

console.log("STEP 4: SCENE READY");
document.getElementById("info").innerText = "RENDERING...";

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  renderer.render(scene,camera);
}

animate();

console.log("STEP 5: LOOP RUNNING");
document.getElementById("info").innerText = "ALL SYSTEMS GO";

</script>

</body>
</html>
