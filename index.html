<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS GLB GITHUB FIX</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
}
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:20px;
}
</style>
</head>
<body>

<div id="info">START...</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,2,5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DEBUG CUBE
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
cube.position.y = 1;
scene.add(cube);

// =====================
// GLB LOADER (FETCH FIX)
// =====================
function loadGLB(path, name){

  const info = document.getElementById("info");
  info.innerText = "Loading: " + path;

  fetch(path)
    .then(res=>{
      if(!res.ok){
        throw new Error("HTTP " + res.status);
      }
      return res.arrayBuffer();
    })
    .then(buffer=>{

      const loader = new THREE.GLTFLoader();

      loader.parse(buffer, "", (gltf)=>{

        const obj = gltf.scene;

        obj.scale.set(1,1,1);
        obj.position.set(0,1,0);

        scene.add(obj);

        info.innerText = "LOADED: " + name;
        console.log("SUCCESS:", name);

      }, (err)=>{
        info.innerText = "PARSE ERROR: " + name;
        console.error(err);
      });

    })
    .catch(err=>{
      info.innerText = "FAILED: " + path;
      console.error(err);
    });
}

// =====================
// ⚠️ PFAD ANPASSEN HIER!
// =====================

// Wenn Dateien im Hauptordner:
loadGLB("pistol.glb", "pistol");
loadGLB("pistol_schacht.glb", "slide");

// Wenn im /models Ordner → stattdessen:
// loadGLB("models/pistol.glb", "pistol");
// loadGLB("models/pistol_schacht.glb", "slide");

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  renderer.render(scene,camera);
}

animate();

document.getElementById("info").innerText = "RUNNING";

</script>

<!-- WICHTIG: GLTFLoader hinzufügen -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

</body>
</html>
