<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS GLB Shooter Fixed</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
}
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:18px;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="info">Loading...</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>

// =====================
// BASIC SETUP
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  1000
);
camera.position.set(0, 1.6, 5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5,10,5);
scene.add(dirLight);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DEBUG (zeigt sofort ob Engine läuft)
const testCube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
testCube.position.y = 1;
scene.add(testCube);

// =====================
// GLB LOADER (STABLE)
// =====================
const loader = new THREE.GLTFLoader();

function loadGLB(path, name){

  document.getElementById("info").innerText = "Loading " + name;

  loader.load(

    path,

    (gltf)=>{

      const obj = gltf.scene;

      // 🔥 REALISTIC FPS SCALE (NICHT RIESIG!)
      obj.scale.set(1,1,1);

      // 🔥 POSITION = in Hand (rechts unten)
      obj.position.set(0.4, -0.3, -0.7);

      // 🔥 SLIGHT FIX FOR VISIBILITY
      obj.traverse(c=>{
        if(c.isMesh){
          c.material.side = THREE.DoubleSide;
          c.material.needsUpdate = true;
        }
      });

      camera.add(obj);
      scene.add(camera);

      console.log("LOADED:", name);

      document.getElementById("info").innerText = "READY";
    },

    undefined,

    (err)=>{
      console.error(err);
      document.getElementById("info").innerText = "ERROR loading " + name;
    }
  );
}

// =====================
// LOAD YOUR MODELS
// =====================
loadGLB("pistol.glb", "pistol");

// Slide (Animation-Teil später wichtig)
loadGLB("pistol_schacht.glb", "slide");

// =====================
// SIMPLE FPS CONTROL (LOOK ONLY)
// =====================
let yaw = 0;
let pitch = 0;

document.addEventListener("click",()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));

  camera.rotation.set(pitch, yaw, 0);
});

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  testCube.rotation.y += 0.01;

  renderer.render(scene,camera);
}

animate();

document.getElementById("info").innerText = "RUNNING";

</script>

</body>
</html>
