<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>STABLE FPS GLB LOADER FIX</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
  z-index:10;
}

#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:20px;
  z-index:10;
}

#ui{
  position:absolute;
  top:50px;
  left:10px;
  z-index:10;
}
</style>
</head>
<body>

<div id="info">CLICK "LOAD GLB"</div>
<div id="crosshair">+</div>

<div id="ui">
  <input type="file" id="file" accept=".glb,.gltf">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>
console.log("START OK");

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DEBUG CUBE
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
cube.position.y = 1;
scene.add(cube);

// =====================
// GLTF LOADER (SAFE)
// =====================
const loader = new THREE.GLTFLoader();

let currentModel;

function loadFromFile(file){

  const reader = new FileReader();

  reader.onload = function(e){

    const arrayBuffer = e.target.result;

    document.getElementById("info").innerText = "LOADING...";

    loader.parse(arrayBuffer, "", function(gltf){

      if(currentModel) scene.remove(currentModel);

      currentModel = gltf.scene;
      currentModel.scale.set(1,1,1);
      currentModel.position.set(0,0,0);

      scene.add(currentModel);

      document.getElementById("info").innerText = "MODEL LOADED ✔";

      console.log("MODEL LOADED");
    });

  };

  reader.readAsArrayBuffer(file);
}

// FILE INPUT
document.getElementById("file").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file) loadFromFile(file);
});

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  renderer.render(scene,camera);
}

animate();

document.getElementById("info").innerText = "READY";

</script>

</body>
</html>
